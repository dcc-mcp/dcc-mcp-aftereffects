tools:
  - name: inspect_project
    description: Return active After Effects project and item metadata.
    input_schema: {type: object, properties: {}}
    read_only: true
    destructive: false
    idempotent: true
    execution: sync
    affinity: any
    timeout_hint_secs: 30
    source_file: scripts/inspect_project.py
  - name: list_compositions
    description: List compositions in the active After Effects project.
    input_schema: {type: object, properties: {}}
    read_only: true
    destructive: false
    idempotent: true
    execution: sync
    affinity: any
    timeout_hint_secs: 30
    source_file: scripts/list_compositions.py
  - name: save_project
    description: Save the After Effects project to an explicit absolute .aep path.
    input_schema:
      type: object
      required: [path]
      properties: {path: {type: string, description: Absolute .aep output path.}}
    read_only: false
    destructive: true
    idempotent: false
    execution: sync
    affinity: any
    timeout_hint_secs: 60
    source_file: scripts/save_project.py
  - name: create_motion_intro
    description: Open an AE template, apply title text and optional audio, save a project copy, and render it.
    input_schema:
      type: object
      required: [template_path, project_path, output_path]
      properties:
        template_path: {type: string, description: Absolute source .aep template path.}
        project_path: {type: string, description: Absolute destination .aep path.}
        output_path: {type: string, description: Absolute rendered media path.}
        title: {type: string, default: DCC-MCP}
        subtitle: {type: string, default: One protocol. Every creative app.}
        audio_paths:
          type: array
          items: {type: string}
          default: []
    read_only: false
    destructive: true
    idempotent: false
    execution: sync
    affinity: any
    timeout_hint_secs: 600
    source_file: scripts/create_motion_intro.py
